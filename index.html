<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cycle of Madness</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000;
            --accent: #b71c1c;
            --accent-glow: #ff5252;
            --text-main: #e0e0e0;
            --slot-bg: #151515;
            --slot-border: #333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000;
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
            color: var(--text-main);
        }

        #app-frame {
            width: 100%;
            max-width: 440px;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
        }

        /* --- ВЕРХНИЙ ИНТЕРФЕЙС --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 15px 20px;
            z-index: 100;
            background: linear-gradient(180deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0.9) 80%, transparent 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        /* Шкала Рассудка */
        .sanity-wrapper {
            width: 100%;
            margin-bottom: 15px;
            pointer-events: auto;
        }
        .sanity-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .sanity-track {
            height: 8px;
            background: #222;
            border-radius: 4px;
            border: 1px solid #444;
            overflow: hidden;
        }
        .sanity-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #555, var(--accent));
            transition: width 0.5s ease;
        }

        /* Кнопка Радио */
        .radio-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
            cursor: pointer;
        }
        .radio-btn {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: rgba(30,30,30,0.8);
            border: 2px solid #555;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            margin-bottom: 5px;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .radio-label {
            font-size: 10px; color: #666; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;
        }

        /* Активное состояние радио */
        .radio-wrapper.active .radio-btn {
            border-color: var(--accent-glow);
            background: rgba(120, 0, 0, 0.4);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            animation: pulse 1.5s infinite;
            color: #fff;
        }
        .radio-wrapper.active .radio-label { color: var(--accent-glow); text-shadow: 0 0 5px rgba(255,0,0,0.5); }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }


        /* --- ИГРОВАЯ ОБЛАСТЬ --- */
        #game-view {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-top: 140px;
        }

        /* Fullscreen Scene */
        .scene-full {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: flex-end;
            z-index: 1;
        }
        .scene-full::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, #000 10%, rgba(0,0,0,0.7) 50%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
        }
        .full-content {
            position: relative; z-index: 2; padding: 20px; padding-bottom: 90px;
        }

        /* Normal Scene */
        .scene-normal {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column;
        }
        .normal-img-wrap {
            position: absolute; top: 0; left: 0; right: 0; height: 50%; z-index: 1;
        }
        .normal-img-wrap img {
            width: 100%; height: 100%; object-fit: cover;
            mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
        }
        .normal-content {
            position: relative; margin-top: auto; z-index: 2;
            padding: 20px; padding-bottom: 90px;
            background: linear-gradient(to bottom, transparent 0%, #000 15%);
            max-height: 60%; overflow-y: auto;
        }

        /* Текст и Кнопки */
        .story-text {
            font-size: 16px; line-height: 1.5; margin-bottom: 20px; color: #ddd;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }
        .text-insane { color: #ff8a80; font-family: monospace; letter-spacing: -0.5px; }

        .btn {
            width: 100%; padding: 15px; margin-bottom: 10px;
            background: rgba(30, 30, 30, 0.7); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(4px); border-radius: 10px; color: #fff;
            text-align: left; font-size: 15px; cursor: pointer; transition: 0.2s;
        }
        .btn:active { background: rgba(183, 28, 28, 0.5); border-color: var(--accent); }
        .btn.locked { opacity: 0.5; background: rgba(0,0,0,0.6); pointer-events: none; color: #777; }


        /* --- ИНВЕНТАРЬ --- */
        #inventory {
            height: 80px; position: absolute; bottom: 0; left: 0; right: 0;
            background: #080808; border-top: 1px solid #222;
            display: flex; justify-content: center; align-items: center; gap: 15px;
            z-index: 200; padding-bottom: env(safe-area-inset-bottom, 10px);
        }
        .inv-slot {
            width: 50px; height: 50px; background: var(--slot-bg);
            border: 1px solid var(--slot-border); border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            font-size: 26px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .inv-slot span { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from {transform: scale(0);} to {transform: scale(1);} }

    </style>
</head>

        // --- ГЛАВНАЯ ФУНКЦИЯ УПРАВЛЕНИЯ ЗВУКОМ ---
        function manageAudio(sceneId) {
            // 1. Запуск музыки после первого клика (браузеры блокируют автоплей)
            if (!state.audioStarted) return;

            const scene = story[sceneId];

            // === СЛОЙ 1: ФОНОВАЯ МУЗЫКА (ЗАВИСИТ ОТ БЕЗУМИЯ) ===
            const bgPlayer = document.getElementById('bg-music');
            let targetBg = AMBIENT_TRACKS.calm;
            
            if (state.madness >= 80) targetBg = AMBIENT_TRACKS.insane;
            else if (state.madness >= 40) targetBg = AMBIENT_TRACKS.tense;

            // Если трек сменился - меняем
            if (!bgPlayer.src.includes(encodeURI(targetBg))) {
                bgPlayer.src = targetBg;
                bgPlayer.volume = 0.4; // Фоновая музыка чуть тише
                bgPlayer.play().catch(e => console.log('BG play block'));
            } else if (bgPlayer.paused) {
                bgPlayer.play().catch(e => {});
            }

            // === СЛОЙ 2: ЗВУК СЦЕНЫ (ОДИН РАЗ) ===
            // Сначала ВСЕГДА выключаем старый звук
            const sfxPlayer = document.getElementById('scene-sfx');
            sfxPlayer.pause();
            sfxPlayer.currentTime = 0; // Перемотка в начало

            // Если есть новый звук — включаем
            if (scene.sound) {
                sfxPlayer.src = scene.sound;
                sfxPlayer.volume = 1.0;
                sfxPlayer.play().catch(e => {});
            }

            // === СЛОЙ 3: РАДИО (ЕСЛИ ВКЛЮЧЕНО) ===
            manageRadio(scene);
        }

        function manageRadio(scene) {
            const player = document.getElementById('radio-player');
            const targetSrc = (scene && scene.radio) ? scene.radio : DEFAULT_RADIO;
            
            // Если источник другой - меняем
            if (!player.src.includes(encodeURI(targetSrc))) {
                player.src = targetSrc;
            }

            // Играем или нет
            if (state.radioOn && state.audioStarted) {
                player.volume = 0.8;
                player.play().catch(e => {});
            } else {
                player.pause();
            }
        }

        function toggleRadio() {
            state.radioOn = !state.radioOn;
            const wrapper = document.getElementById('radio-wrapper');
            const player = document.getElementById('radio-player');

            if (state.radioOn) {
                wrapper.classList.add('active');
                if (state.audioStarted) player.play().catch(e=>{});
            } else {
                wrapper.classList.remove('active');
                player.pause();
            }
        }

        // --- ДВИЖОК ИНТЕРФЕЙСА ---

        function updateUI() {
            document.getElementById('sanity-bar').style.width = state.madness + '%';
            document.getElementById('sanity-val').innerText = state.madness + '%';
            
            ['notebook', 'knife', 'camera', 'cross'].forEach(item => {
                const el = document.getElementById('slot-' + item);
                if (state.inventory.includes(item)) {
                    if (el.innerHTML === "") el.innerHTML = `<span>${ITEM_ICONS[item]}</span>`;
                } else {
                    el.innerHTML = "";
                }
            });
        }

        function renderScene(sceneId) {
            if (state.madness >= 100 && !sceneId.includes("game_over") && !sceneId.includes("end") && !sceneId.includes("forest_end")) {
                sceneId = "game_over"; 
            }

            const scene = story[sceneId];
            if (!scene) return;
            state.scene = sceneId;
            
            // Звук клика (кроме самого старта)
            if (state.audioStarted) document.getElementById('click-sfx').play().catch(()=>{});

            // Рендер картинки/текста (как раньше)
            let img = scene.img;
            let text = scene.text;
            if (state.madness >= 60 && scene.img_60) img = scene.img_60;
            else if (state.madness >= 40 && scene.img_40) img = scene.img_40;
            if (state.madness >= 60 && scene.text_60) text = scene.text_60;
            else if (state.madness >= 40 && scene.text_40) text = scene.text_40;
            else if (state.madness === 0 && scene.text_0) text = scene.text_0;

            const view = document.getElementById('game-view');
            view.innerHTML = '';

            // Функция отрисовки кнопок (вынес отдельно)
            const createContent = (isFull) => {
                const content = document.createElement('div');
                content.className = isFull ? 'full-content' : 'normal-content';
                if (text) {
                    const txtDiv = document.createElement('div');
                    txtDiv.className = 'story-text';
                    if (state.madness > 80) txtDiv.classList.add('text-insane');
                    txtDiv.innerText = text;
                    content.appendChild(txtDiv);
                }
                appendButtons(content, scene);
                return content;
            };

            if (scene.type === 'full') {
                const wrap = document.createElement('div');
                wrap.className = 'scene-full';
                wrap.style.backgroundImage = `url('${img}')`;
                wrap.appendChild(createContent(true));
                view.appendChild(wrap);
            } else {
                const wrap = document.createElement('div');
                wrap.className = 'scene-normal';
                const imgWrap = document.createElement('div');
                imgWrap.className = 'normal-img-wrap';
                const image = document.createElement('img');
                image.src = img;
                imgWrap.appendChild(image);
                wrap.appendChild(imgWrap);
                wrap.appendChild(createContent(false));
                view.appendChild(wrap);
            }
            
            // Обновляем аудио
            manageAudio(sceneId);
        }

        function appendButtons(container, scene) {
            scene.choices.forEach(choice => {
                if (choice.showIfMadnessMin && state.madness < choice.showIfMadnessMin) return;
                if (choice.showIfMadnessMax && state.madness > choice.showIfMadnessMax) return;
                if (choice.showIfAllItems && !choice.showIfAllItems.every(i => state.inventory.includes(i))) return;

                const btn = document.createElement('div');
                btn.className = 'btn';
                let isLocked = false;
                let btnText = choice.text;

                if (choice.reqItem && !state.inventory.includes(choice.reqItem)) {
                    isLocked = true;
                    btn.classList.add('locked');
                    btnText = `🔒 ${btnText}`;
                }
                btn.innerHTML = `<span>${btnText}</span>`;

                if (!isLocked) {
                    btn.onclick = () => {
                        // Просто снимаем блокировку автоплея, ничего не запуская напрямую
                        if (!state.audioStarted) {
                            state.audioStarted = true;
                        }

                        if (choice.madness) state.madness += choice.madness;
                        state.madness = Math.max(0, Math.min(100, state.madness));

                        if (scene.getItem && !state.inventory.includes(scene.getItem)) state.inventory.push(scene.getItem);
                        if (scene.removeItem) state.inventory = state.inventory.filter(i => i !== scene.removeItem);
                        if (choice.removeItem) state.inventory = state.inventory.filter(i => i !== choice.removeItem);

                        if (choice.reset) { state.madness = 0; state.inventory = []; }

                        updateUI(); 
                        renderScene(choice.next); 
                    };
                }
                container.appendChild(btn);
            });
        }

        // Запуск
        updateUI();
        renderScene('start');
    </script>
